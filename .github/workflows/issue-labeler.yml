name: Issue labeler

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label:
    name: auto-label issue
    runs-on: ubuntu-latest
    if: github.repository == 'rhysmcneill/helm-semver'
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const content = [
              context.payload.issue.title,
              context.payload.issue.body ?? '',
            ].join(' ').tolowercase();

            const labelmap = [
              { keywords: ['bug', 'error', 'fail', 'crash', 'broken', 'panic'],            label: 'bug' },
              { keywords: ['feature', 'enhancement', 'improve', 'add support', 'request'], label: 'enhancement' },
              { keywords: ['ci', 'workflow', 'action', 'pipeline', 'github actions'],      label: 'ci' },
              { keywords: ['doc', 'readme', 'contributing', 'comment', 'documentation'],   label: 'documentation' },
              { keywords: ['chore', 'dependency', 'dependabot', 'upgrade', 'bump'],        label: 'chore' },
              { keywords: ['performance', 'benchmark', 'slow', 'perf'],                    label: 'performance' },
              { keywords: ['security', 'cve', 'vulnerability', 'gosec'],                   label: 'security' },
            ];

            const matched = labelmap
              .filter(({ keywords }) => keywords.some(kw => content.includes(kw)))
              .map(({ label }) => label);

            if (matched.length > 0) {
              await github.rest.issues.addlabels({
                ...context.repo,
                issue_number: context.issue.number,
                labels: matched,
              });
            }
