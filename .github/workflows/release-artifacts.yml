name: Release Artifacts

# Manually re-run or backfill binaries + Docker for any existing tag.
# Use this to fix a release where artifacts were missing (e.g. the initial v1.0.0).
#
# Usage:
#   gh workflow run release-artifacts.yml --field tag=v1.0.0
#   or: Actions → Release Artifacts → Run workflow → enter tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build artifacts for (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build & upload binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X github.com/rmcneill/helm-semver/internal/version.Version=${VERSION} \
            -X github.com/rmcneill/helm-semver/internal/version.Commit=${COMMIT} \
            -X github.com/rmcneill/helm-semver/internal/version.BuildDate=${BUILD_DATE}"
          BINARY="helm-semver-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -ldflags="${LDFLAGS}" -o "${BINARY}" ./cmd/helm-semver
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} \
            helm-semver-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            helm-semver-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256 \
            --clobber

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/helm-semver
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event.inputs.tag }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
