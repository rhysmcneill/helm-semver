name: Release Artifacts

# Manually re-run or backfill binaries + Docker for any existing tag.
# Use this to fix a release where artifacts were missing (e.g. the initial v1.0.0).
#
# Usage:
#   gh workflow run release-artifacts.yml --field tag=v1.0.0
#   or: Actions → Release Artifacts → Run workflow → enter tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build artifacts for (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build & upload binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X github.com/rmcneill/helm-semver/internal/version.Version=${VERSION} \
            -X github.com/rmcneill/helm-semver/internal/version.Commit=${COMMIT} \
            -X github.com/rmcneill/helm-semver/internal/version.BuildDate=${BUILD_DATE}"
          BINARY="helm-semver-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -ldflags="${LDFLAGS}" -o "${BINARY}" ./cmd/helm-semver
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} \
            helm-semver-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            helm-semver-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256 \
            --clobber

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff9f31afdc8c9a6b1b4 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b0dd08a1dd8d4e5b60e3e1e52d88288eb5e # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a7b53a0a3e8cf2a78c0b86e # v5.7.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/helm-semver
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event.inputs.tag }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
